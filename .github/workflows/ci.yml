name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: api (tsc + jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --ci

  migrate-check:
    name: migrate-check (provisioning convergence + idempotency)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: frank_pilot_migrate_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/frank_pilot_migrate_check
      NODE_ENV: development

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # First run on a fresh DB: idempotent base schema + every tracked delta.
      - name: Migrate (fresh DB)
        run: npm run migrate

      # Convergence: deltas actually ran on a fresh DB. voice_browser_sessions
      # is a migration-ONLY object (not in schema.ts) — before this runner,
      # `npm run migrate` skipped it and the table was missing from CI/fresh
      # installs. Also assert schema_migrations tracked exactly one row per file.
      - name: Assert migration-only objects + tracking are present
        run: |
          set -euo pipefail
          have=$(psql "$DATABASE_URL" -tAc "SELECT to_regclass('public.voice_browser_sessions') IS NOT NULL")
          test "$have" = "t" || { echo "voice_browser_sessions missing — deltas did not apply"; exit 1; }
          files=$(ls src/db/migrations/*.sql | wc -l | tr -d ' ')
          rows=$(psql "$DATABASE_URL" -tAc "SELECT count(*) FROM schema_migrations")
          echo "delta files=$files  schema_migrations rows=$rows"
          test "$files" = "$rows" || { echo "tracking mismatch: $rows tracked vs $files files"; exit 1; }

      # Idempotency: a second run must apply nothing and must not error.
      - name: Migrate again (must be a no-op)
        run: |
          set -euo pipefail
          out=$(npm run migrate 2>&1)
          echo "$out"
          echo "$out" | grep -q "0 pending" || { echo "second migrate was not a no-op"; exit 1; }

      - name: Show migration status
        run: npm run migrate status

  client-tenant:
    name: client-tenant (tsc + vite build + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: client-tenant
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client-tenant/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build (vite)
        run: npm run build

      - name: Run tests (vitest)
        run: npm test -- --run

  check-i18n:
    name: check-i18n (EN-ES parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Check EN-ES i18n parity
        working-directory: client-tenant
        run: node scripts/check-i18n-parity.mjs

  pm-console-e2e:
    name: pm-console-e2e (staff console Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: frank_pilot_pm_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/frank_pilot_pm_e2e
      NODE_ENV: development
      PORT: '3002'
      JWT_SECRET: ci-pm-e2e-secret-do-not-reuse
      # Point Playwright at the manually-started Vite below; this also makes
      # playwright.config skip its own webServer boot (which assumes a local
      # Docker/Postgres via `npm run e2e:up`).
      E2E_BASE_URL: http://127.0.0.1:5176

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root deps (backend)
        run: npm ci

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Install Playwright chromium
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Migrate database
        run: npm run migrate

      - name: Seed database
        run: npm run seed

      - name: Start backend
        run: |
          mkdir -p /tmp/pm-e2e-logs
          nohup npm run dev > /tmp/pm-e2e-logs/backend.log 2>&1 &
          echo $! > /tmp/pm-e2e-logs/backend.pid
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:3002/health > /dev/null 2>&1; then
              echo "backend ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to come up"; tail -200 /tmp/pm-e2e-logs/backend.log; exit 1

      - name: Start Vite dev server (PM console)
        working-directory: client
        run: |
          nohup npx vite --host 127.0.0.1 --port 5176 > /tmp/pm-e2e-logs/vite.log 2>&1 &
          echo $! > /tmp/pm-e2e-logs/vite.pid
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5176 > /dev/null 2>&1; then
              echo "vite ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "vite failed to come up"; tail -200 /tmp/pm-e2e-logs/vite.log; exit 1

      - name: Run PM console e2e
        working-directory: client
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pm-console-e2e-report
          path: |
            client/playwright-report
            client/test-results
            /tmp/pm-e2e-logs
          if-no-files-found: warn
          retention-days: 7

  tenant-e2e:
    name: tenant-e2e (Playwright harness — map + apply)
    runs-on: ubuntu-latest
    timeout-minutes: 14

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: frank_pilot_tenant_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/frank_pilot_tenant_e2e
      NODE_ENV: development
      PORT: '3002'
      JWT_SECRET: ci-tenant-e2e-secret-do-not-reuse
      TENANT_PORTAL_URL: http://127.0.0.1:5174
      CORS_ORIGIN: http://127.0.0.1:5174
      # Point Playwright at the manually-started Vite below so playwright.config
      # reuses it (reuseExistingServer) instead of booting `npm run e2e:up`,
      # which assumes a local Docker/Postgres.
      E2E_BASE_URL: http://127.0.0.1:5174

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root deps (backend)
        run: npm ci

      - name: Install client-tenant deps
        working-directory: client-tenant
        run: npm install --no-audit --no-fund

      - name: Install Playwright chromium
        working-directory: client-tenant
        run: npx playwright install --with-deps chromium

      - name: Migrate database
        run: npm run migrate

      - name: Seed database
        run: npm run seed

      - name: Start backend
        run: |
          mkdir -p /tmp/tenant-e2e-logs
          nohup npm run dev > /tmp/tenant-e2e-logs/backend.log 2>&1 &
          echo $! > /tmp/tenant-e2e-logs/backend.pid
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:3002/health > /dev/null 2>&1; then
              echo "backend ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to come up"; tail -200 /tmp/tenant-e2e-logs/backend.log; exit 1

      - name: Start Vite dev server (tenant portal)
        working-directory: client-tenant
        run: |
          nohup npx vite --host 127.0.0.1 --port 5174 > /tmp/tenant-e2e-logs/vite.log 2>&1 &
          echo $! > /tmp/tenant-e2e-logs/vite.pid
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5174 > /dev/null 2>&1; then
              echo "vite ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "vite failed to come up"; tail -200 /tmp/tenant-e2e-logs/vite.log; exit 1

      - name: Run tenant e2e (Playwright — incl. @mobile layout checks)
        working-directory: client-tenant
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: tenant-e2e-report
          path: |
            client-tenant/playwright-report
            client-tenant/test-results
            /tmp/tenant-e2e-logs
          if-no-files-found: warn
          retention-days: 7

  smoke-apply:
    name: smoke-apply (Welcome → Claim e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: frank_pilot_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/frank_pilot_smoke
      NODE_ENV: development
      PORT: '3002'
      JWT_SECRET: ci-smoke-secret-do-not-reuse
      TENANT_PORTAL_URL: http://127.0.0.1:5174
      CORS_ORIGIN: http://127.0.0.1:5174

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root deps (backend + smoke script)
        run: npm ci

      - name: Install client-tenant deps
        working-directory: client-tenant
        run: npm install --no-audit --no-fund

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Migrate database
        run: npm run migrate

      - name: Seed database
        run: npm run seed

      - name: Start backend
        run: |
          mkdir -p /tmp/smoke-logs
          nohup npm run dev > /tmp/smoke-logs/backend.log 2>&1 &
          echo $! > /tmp/smoke-logs/backend.pid
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:3002/health > /dev/null 2>&1; then
              echo "backend ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to come up"; tail -200 /tmp/smoke-logs/backend.log; exit 1

      - name: Start Vite dev server
        working-directory: client-tenant
        run: |
          nohup npx vite --host 127.0.0.1 --port 5174 > /tmp/smoke-logs/vite.log 2>&1 &
          echo $! > /tmp/smoke-logs/vite.pid
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5174 > /dev/null 2>&1; then
              echo "vite ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "vite failed to come up"; tail -200 /tmp/smoke-logs/vite.log; exit 1

      - name: Run apply smoke
        env:
          BASE: http://127.0.0.1:5174
          OUT: /tmp/qa-apply-handoff
        run: node scripts/qa-apply-handoff.mjs | tee /tmp/smoke-logs/smoke.log

      - name: Assert no FAIL in smoke output
        run: |
          if grep -E "^FAIL " /tmp/smoke-logs/smoke.log; then
            echo "::error::Apply smoke produced FAIL lines"; exit 1
          fi

      - name: Upload smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: apply-smoke-failure
          path: |
            /tmp/qa-apply-handoff
            /tmp/smoke-logs
          if-no-files-found: warn
          retention-days: 7
