name: Prod smoke

# Catches silent prod regressions on https://frank-pilot-tenant.vercel.app.
# Manual: `gh workflow run prod-smoke.yml`
# Scheduled: every 6 hours.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  prod-smoke:
    name: prod-smoke (apply handoff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install Playwright (no-save, no full root install)
        run: npm install playwright@^1.60.0 --no-save --no-audit --no-fund

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run prod smoke
        id: smoke
        env:
          BASE: https://frank-pilot-tenant.vercel.app
          OUT: /tmp/qa-apply-handoff-prod
        run: |
          mkdir -p /tmp/smoke-logs
          set -o pipefail
          node scripts/qa-apply-handoff-prod.mjs 2>&1 | tee /tmp/smoke-logs/smoke.log

      - name: Summarize failing checks
        if: failure()
        run: |
          {
            echo "## Prod smoke failed"
            echo ""
            echo "Target: \`https://frank-pilot-tenant.vercel.app\`"
            echo ""
            if [ -f /tmp/smoke-logs/smoke.log ]; then
              echo "### Failing checks"
              echo ""
              echo '```'
              grep -E "^FAIL " /tmp/smoke-logs/smoke.log || echo "(no FAIL lines — runtime or setup error; see full log below)"
              echo '```'
              echo ""
              echo "### Full output (tail)"
              echo ""
              echo '```'
              tail -n 80 /tmp/smoke-logs/smoke.log
              echo '```'
            else
              echo "No smoke log captured."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: prod-smoke-failure
          path: |
            /tmp/qa-apply-handoff-prod
            /tmp/smoke-logs
          if-no-files-found: warn
          retention-days: 7

  compliance-tape-verify:
    name: compliance-tape-verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Independent of the Playwright smoke — chain-integrity health does not
    # depend on UI handoff health. Both jobs surface as separate checks.
    steps:
      - name: Gate on secrets
        id: gate
        env:
          TOKEN: ${{ secrets.SMOKE_AUDIT_TOKEN }}
          APPLICANT_ID: ${{ secrets.SMOKE_APPLICANT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$APPLICANT_ID" ]; then
            echo "::notice::SMOKE_AUDIT_TOKEN and/or SMOKE_APPLICANT_ID not set — skipping. Set repo secrets to enable. Token must have audit:view scope; rotate quarterly. See docs/runbooks/bp02-rollback.md."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify chain integrity
        if: steps.gate.outputs.skip == 'false'
        env:
          TOKEN: ${{ secrets.SMOKE_AUDIT_TOKEN }}
          APPLICANT_ID: ${{ secrets.SMOKE_APPLICANT_ID }}
          API_BASE: https://api-production-ed89.up.railway.app
        run: |
          set -euo pipefail
          status=$(curl -sS -o /tmp/verify.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "$API_BASE/api/compliance-tape/verify?applicantId=$APPLICANT_ID")
          echo "HTTP $status"
          cat /tmp/verify.json
          echo ""
          if [ "$status" != "200" ]; then
            echo "::error::compliance-tape/verify returned HTTP $status"
            exit 1
          fi
          ok=$(jq -r '.ok' < /tmp/verify.json)
          if [ "$ok" != "true" ]; then
            broke_at=$(jq -r '.brokeAt // "n/a"' < /tmp/verify.json)
            reason=$(jq -r '.reason // "no reason given"' < /tmp/verify.json)
            echo "::error::chain break detected at sequence $broke_at: $reason"
            exit 1
          fi
          echo "compliance-tape chain ok"
