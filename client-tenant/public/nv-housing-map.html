<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Universal Housing — Nevada affordable housing map</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
  :root{
    --cream:#FBF7F0; --paper:#FFFFFF; --border:#EBE3D2; --borderHi:#D9CFB8;
    --ink:#1F1A12; --ink2:#4A4338; --ink3:#807866;
    --accent:#C9492A; --accentHi:#E15C3B; --accentLo:#FDF1EC; --accentInk:#7A2A18;
    --sage:#5C7A4F; --sageLo:#EEF3EA; --ok:#3F7A3A; --warn:#9C6A18; --warnLo:#FAF1DB;
    --display:"Manrope",-apple-system,system-ui,sans-serif;
    --body:"Inter",-apple-system,system-ui,sans-serif;
    --sh-xs:0 1px 2px rgba(31,26,18,.06);
    --sh-sm:0 1px 3px rgba(31,26,18,.10),0 1px 2px rgba(31,26,18,.06);
    --sh-md:0 4px 14px rgba(31,26,18,.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{background:var(--cream);font-family:var(--body);color:var(--ink);
       -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
       display:flex;flex-direction:column;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#D9CFB8;border-radius:999px;}
  ::-webkit-scrollbar-thumb:hover{background:#B0A892;}

  /* Header */
  header.app{display:flex;align-items:center;gap:14px;padding:14px 24px;flex:none;
    background:var(--paper);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;}
  .logo{width:32px;height:32px;border-radius:8px;background:var(--accent);color:#fff;
    display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:18px;}
  .brand{font-family:var(--display);font-weight:800;font-size:17px;color:var(--ink);}
  .brand span{color:var(--ink3);font-weight:600;}
  .eyebrow{margin-left:auto;font-family:var(--display);font-weight:700;font-size:12px;
    letter-spacing:.04em;text-transform:uppercase;color:var(--accent);}

  /* Layout — header-height-agnostic: body is a flex column, .body fills the rest.
     Phase 2-A: the map is now a near-pure render surface (React owns filters via
     postMessage), so the body is a single full-width map column — no more list
     rail. */
  .body{position:relative;flex:1 1 auto;min-height:0;}
  .map-col{position:absolute;inset:0;}
  #map{position:absolute;inset:0;}
  /* warm the OSM tiles toward cream */
  .leaflet-tile-pane{filter:sepia(.18) saturate(.85) brightness(1.04) contrast(.96);}
  .leaflet-container{background:#e6ddc8;font-family:var(--body);}

  /* Count overlay pill — warm-paper, top-left of the map. React owns the
     filter rail now; this is the only chrome the map keeps. Its innerText must
     start with the visible-count integer ("17 of 352") — an e2e regex parses
     ^(\d+) as the count regression lock. */
  .count{position:absolute;top:16px;left:16px;z-index:600;background:var(--paper);
    border-radius:999px;box-shadow:var(--sh-sm);padding:8px 14px;
    font-family:var(--display);font-weight:800;font-size:14px;color:var(--ink);
    display:inline-flex;align-items:center;gap:4px;}
  .count small{font-family:var(--body);font-weight:500;font-size:12px;color:var(--ink3);}

  /* Pins */
  .pin{width:34px;height:34px;}
  .pin svg{display:block;width:100%;height:100%;
    filter:drop-shadow(0 3px 5px rgba(31,26,18,.5));}
  .pin svg path{stroke:#fff;stroke-width:1.3;paint-order:stroke fill;}
  .pin.senior svg path{fill:var(--sage);}
  .pin.family svg path{fill:var(--accent);}
  .pin.mixed  svg path{fill:var(--warn);}
  .pin.hot{z-index:1000 !important;}
  .pin.hot svg{transform:scale(1.35);transform-origin:bottom center;
    filter:drop-shadow(0 4px 6px rgba(201,73,42,.5));}

  /* Cluster bubbles */
  .marker-cluster{background:rgba(201,73,42,.3);width:46px !important;height:46px !important;}
  .marker-cluster div{width:38px;height:38px;margin:4px;line-height:38px;font-size:15px;
    background:var(--accent);color:#fff;font-family:var(--display);
    font-weight:800;border:3px solid #fff;box-shadow:var(--sh-md);}

  /* Popup */
  .leaflet-popup-content-wrapper{border-radius:14px;box-shadow:var(--sh-md);}
  .leaflet-popup-content{margin:14px 16px;font-family:var(--body);min-width:210px;}
  .pop h4{font-family:var(--display);font-weight:800;font-size:15px;margin:0 0 2px;color:var(--ink);}
  .pop .addr{font-size:12px;color:var(--ink3);margin:0 0 9px;}
  .pop .row{font-size:12.5px;color:var(--ink2);margin:3px 0;}
  .pop .row b{color:var(--ink);}
  .pop .pop-cta{display:inline-block;margin-top:10px;padding:7px 14px;border-radius:999px;
    background:var(--accent);color:#fff;font-family:var(--display);font-weight:700;
    font-size:12.5px;text-decoration:none;box-shadow:var(--sh-xs);transition:background .12s;}
  .pop .pop-cta:hover{background:var(--accentHi);}
  /* Availability urgency badge — sage/ok green, sits under the title */
  .pop .pop-avail{display:inline-flex;align-items:center;gap:5px;margin:0 0 8px;
    padding:3px 9px;border-radius:999px;background:var(--sageLo);color:var(--ok);
    border:1px solid #D2DDC9;font-family:var(--display);font-weight:700;font-size:11px;}
  .pop .pop-avail b{color:var(--ok);}
  /* AMI tier chips — tight popup-scoped pills reusing the neutral tag language */
  .pop .pop-amis{display:flex;gap:5px;flex-wrap:wrap;margin:2px 0 1px;}
  .pop .pop-ami{display:inline-flex;align-items:center;padding:2px 8px;border-radius:7px;
    font-size:11px;font-weight:600;background:var(--cream);color:var(--ink2);
    border:1px solid var(--border);}

  /* Legend */
  .legend{position:absolute;bottom:16px;left:16px;z-index:600;background:var(--paper);
    border-radius:999px;box-shadow:var(--sh-sm);padding:8px 14px;font-size:12px;font-weight:500;
    color:var(--ink2);display:flex;gap:14px;align-items:center;}
  .legend i{width:9px;height:9px;border-radius:99px;display:inline-block;margin-right:5px;vertical-align:middle;}

  /* Mobile: the map is already full-bleed (single column), so we only trim the
     header and overlay chrome. No list rail to stack anymore. */
  @media (max-width:768px){
    header.app{padding:11px 16px;gap:10px;}
    header.app .brand{font-size:15px;}
    header.app .eyebrow{display:none;}
    .legend{bottom:12px;left:12px;gap:11px;padding:7px 12px;font-size:11.5px;}
    .count{top:12px;left:12px;font-size:13px;padding:7px 12px;}
  }
</style>
</head>
<body>
<header class="app">
  <div class="logo">U</div>
  <div class="brand">Universal Housing<span> · Nevada</span></div>
  <div class="eyebrow" id="eyebrow">Nevada LIHD · loading…</div>
</header>

<div class="body">
  <div class="map-col">
    <div id="map"></div>
    <div class="count" id="count"></div>
    <div class="legend">
      <span><i style="background:#C9492A"></i>Family</span>
      <span><i style="background:#5C7A4F"></i>Senior</span>
      <span><i style="background:#9C6A18"></i>Mixed</span>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// kebab-case a property name into a URL slug (matches gpmg-fixtures.ts slugify).
function slugify(name){
  return String(name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}
// Populated live from /api/applicants/properties/map at boot.
let PROPS = [];
PROPS.forEach((p,i)=>p._id=i);

// Filter state. React (the parent /discover page) is the source of truth and
// drives these via the 'frank:filters' postMessage; initFiltersFromURL seeds
// them for direct-nav / deep-link first paint. fFund stays 'all' (Funding was
// dropped from the React filter UI in Phase 2-A) but is kept in matches() +
// ctaQuery() so the popup-href logic is unchanged.
let fType='all', fCity='all', fFund='all', fAvail=false;

// Hydrate initial filter state from the URL the parent /discover page forwards
// into the iframe src (PropertyList passes its active chips through). This is
// what makes a deep-link like ?availability=available_now&type=family land on
// the map already filtered — same dimensions the List view applies.
(function initFiltersFromURL(){
  const q = new URLSearchParams(location.search);
  // React uses lowercase GPMGType ('family'|'senior'); the map labels are
  // capitalized. 'mixed' has no list-side counterpart but we accept it.
  const t = (q.get('type')||'').toLowerCase();
  if(t==='family') fType='Family'; else if(t==='senior') fType='Senior'; else if(t==='mixed') fType='Mixed';
  const c = q.get('city'); if(c) fCity=c;            // city strings match 1:1
  if(q.get('availability')==='available_now') fAvail=true;
})();

// ---- Map -------------------------------------------------------------
const map = L.map('map',{zoomControl:false});
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'&copy; OpenStreetMap'
}).addTo(map);
// Default statewide Nevada view so the basemap paints immediately — before
// markers load and even if data never arrives. Without an initial view a
// Leaflet map renders blank/grey. render() calls fitBounds() to reframe once
// properties hydrate, so this only governs the pre-data (and no-data) state.
map.setView([38.8, -116.5], 6);
// Mobile stacks the layout and orientation changes resize the map container;
// Leaflet must be told to recompute its size or tiles leave grey gaps.
let _resizeT;
window.addEventListener('resize', ()=>{
  clearTimeout(_resizeT);
  _resizeT = setTimeout(()=>map.invalidateSize(), 150);
});

const pinSVG = `<svg width="26" height="26" viewBox="0 0 24 24"><path d="M12 0C7 0 3 4 3 9c0 6 9 15 9 15s9-9 9-15c0-5-4-9-9-9z"/><circle cx="12" cy="9" r="3.4" fill="#fff"/></svg>`;
function icon(type,hot){
  return L.divIcon({html:pinSVG, className:`pin ${type.toLowerCase()}${hot?' hot':''}`,
    iconSize:[34,34], iconAnchor:[17,34], popupAnchor:[0,-32]});
}

const cluster = L.markerClusterGroup({
  maxClusterRadius:30, spiderfyOnMaxZoom:true, showCoverageOnHover:false,
});
map.addLayer(cluster);

const markers = {};   // _id -> marker
// Normalize an AMI tier label to the compact "60%" form. The two snapshots
// disagree on format ("60%" vs "60% AMI"); strip a trailing "AMI" so chips
// render consistently regardless of source.
function normAmi(t){
  return String(t||'').replace(/\s*ami\s*$/i,'').trim();
}
// Map the map's capitalized fType back to the lowercase GPMGType the React side
// (initFiltersFromURL) expects, and build a querystring from only the active
// (non-'all', truthy) filters to forward into the CTA href.
function ctaQuery(){
  const qs = new URLSearchParams();
  if(fType && fType!=='all') qs.set('type', fType.toLowerCase());
  if(fCity && fCity!=='all') qs.set('city', fCity);
  if(fFund && fFund!=='all') qs.set('fund', fFund);
  if(fAvail) qs.set('availability', 'available_now');
  const s = qs.toString();
  return s ? '?'+s : '';
}
function popupHTML(p){
  const hasAvail = p.availableUnits > 0;
  const amiChips = p.amiTiers.length
    ? `<div class="pop-amis">${p.amiTiers.map(t=>`<span class="pop-ami">${normAmi(t)}</span>`).join('')}</div>`
    : '<b>—</b>';
  const fund = p.funding.length ? p.funding.join(', ') : 'Not specified';
  const ctaLabel = hasAvail ? 'Apply now &rarr;' : 'View / Apply &rarr;';
  return `<div class="pop"><h4>${p.name}</h4>`
    + (hasAvail?`<div class="pop-avail">&#9679; <b>${p.availableUnits}</b> available now</div>`:'')
    + (p.aka?`<div class="addr">aka ${p.aka}</div>`:'')
    + `<div class="addr">${p.address}</div>`
    + `<div class="row"><b>${p.totalUnits??'—'}</b> total units`
    + (p.restrictedUnits!=null?` · <b>${p.restrictedUnits}</b> restricted`:'') + `</div>`
    + `<div class="row">Type: <b>${p.type}</b></div>`
    + `<div class="row">AMI set-asides: ${amiChips}</div>`
    + `<div class="row">Funding: ${fund}</div>`
    + `<a class="pop-cta" href="/property/${slugify(p.name)}${ctaQuery()}" target="_top">${ctaLabel}</a></div>`;
}

// ---- Filters ---------------------------------------------------------
function matches(p){
  // Only the GPMG availability layer carries availableUnits. Statewide-coverage
  // rows have none, so "Available now" narrows to the real-availability subset
  // and the coverage markers drop out while the filter is active.
  const availOk = !fAvail || (p.availableUnits>0);
  return (fType==='all'||p.type===fType)
      && (fCity==='all'||p.city===fCity)
      && (fFund==='all'||p.funding.includes(fFund))
      && availOk;
}

// ---- postMessage: React is the single source of filter truth -----------
// The parent /discover page (PropertyList.tsx) owns the Type / City /
// Availability chips. It pushes filter changes down here WITHOUT reloading the
// iframe. We accept messages only from our own origin and ignore anything
// malformed. On boot we post 'frank:ready' up so React knows when to send the
// current state (handshake — avoids a race where React posts before this
// script is listening).
function applyFilters(f){
  if(!f || typeof f !== 'object') return;
  // type: lowercase GPMGType ('family'|'senior'|'mixed'|'all'|null) → map's
  // capitalized fType. Anything unrecognized resets to 'all'.
  const t = String(f.type||'all').toLowerCase();
  fType = t==='family' ? 'Family' : t==='senior' ? 'Senior' : t==='mixed' ? 'Mixed' : 'all';
  // city: a string matches 1:1; 'all'/falsy clears it.
  fCity = (typeof f.city === 'string' && f.city && f.city !== 'all') ? f.city : 'all';
  // availability: only 'available_now' flips the flag.
  fAvail = f.availability === 'available_now';
  render();
}
window.addEventListener('message', (event)=>{
  if(event.origin !== window.location.origin) return;
  const d = event.data;
  if(!d || typeof d !== 'object' || d.type !== 'frank:filters') return;
  applyFilters(d.filters);
});

// ---- Render ----------------------------------------------------------
function render(){
  const shown = PROPS.filter(matches);

  // count overlay pill — leading integer is the count regression lock.
  document.getElementById('count').innerHTML =
    `${shown.length} <small>of ${PROPS.length}${fAvail?' available now':''}</small>`;
  document.getElementById('eyebrow').textContent =
    `${PROPS.length} affordable communities`;

  // markers
  cluster.clearLayers();
  Object.keys(markers).forEach(k=>delete markers[k]);
  shown.forEach(p=>{
    const m = L.marker([p.lat,p.lng],{icon:icon(p.type,false)});
    m.bindPopup(popupHTML(p));
    markers[p._id]=m;
    cluster.addLayer(m);
  });

  // fit bounds on first/filtered render
  if(shown.length){
    const b=L.latLngBounds(shown.map(p=>[p.lat,p.lng]));
    map.fitBounds(b,{padding:[40,40], maxZoom:14});
  }
}

function boot(){
  if(!PROPS.length){
    document.getElementById('count').innerHTML = '0 <small>statewide Nevada</small>';
    return;
  }
  render();
  // Container may have just been laid out; recompute size so the basemap fills
  // it and fitBounds frames correctly.
  setTimeout(()=>map.invalidateSize(), 60);
}

// ---- Load data: live DB first, bundled snapshot as offline fallback ---
// Primary source is the live, DB-backed markers endpoint. When it's
// unreachable (local dev with no backend, a stale backend missing the route,
// a network outage, or an empty result), we fall back to
// /nv-housing-props.json — a committed statewide snapshot served as a static
// asset. This mirrors the List view's GPMG_FIXTURES fallback and preserves the
// gpmglv demo's offline guarantee: the map always renders. Rows from both
// sources share one shape; the snapshot additionally carries amiTiers +
// funding (the live route omits those today), so the fallback is a superset.
// type is one of 'Family' | 'Senior' | 'Mixed'.
function hydrate(rows){
  PROPS = (Array.isArray(rows)?rows:[]).map((p,i)=>({
    name: p.name,
    slug: p.slug || slugify(p.name),
    aka: p.aka || '',
    city: p.city,
    address: p.address || p.city || '',
    lat: p.lat,
    lng: p.lng,
    totalUnits: p.totalUnits,
    restrictedUnits: p.restrictedUnits,
    availableUnits: p.availableUnits,   // present only on the GPMG availability layer
    type: p.type,
    amiTiers: Array.isArray(p.amiTiers) ? p.amiTiers : [],
    funding: Array.isArray(p.funding) ? p.funding : [],
    _id: i,
  })).filter(p=>Number.isFinite(p.lat) && Number.isFinite(p.lng));
  boot();
  // Handshake: tell the parent /discover page we're listening so it can push
  // the current filter state down. Guarded to our own origin.
  try{ window.parent?.postMessage({type:'frank:ready'}, window.location.origin); }catch(e){}
}
// Hybrid load: a real-availability layer (live DB rows if present, else the
// bundled GPMG snapshot) merged with the statewide coverage snapshot. The
// availability layer wins on slug collision so its availableUnits drive the
// "Available now" filter; coverage rows fill out the statewide map.
function okJson(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }
function mergeLayers(availLayer, coverage){
  const seen = new Set(availLayer.map(p=>p.slug || slugify(p.name)));
  return availLayer.concat(coverage.filter(p=>!seen.has(p.slug || slugify(p.name))));
}
Promise.all([
  fetch('/api/applicants/properties/map').then(okJson).catch(()=>[]),
  fetch('/nv-gpmg-map-props.json').then(okJson).catch(()=>[]),
  fetch('/nv-housing-props.json').then(okJson).catch(()=>[]),
]).then(([live, gpmg, statewide])=>{
  const liveOk = Array.isArray(live) && live.some(r=>r && 'availableUnits' in r);
  const availLayer = liveOk ? live : (Array.isArray(gpmg) ? gpmg : []);
  const coverage = Array.isArray(statewide) ? statewide : [];
  const merged = mergeLayers(availLayer, coverage);
  if(!merged.length) throw new Error('no data');
  hydrate(merged);
}).catch(()=>{
  document.getElementById('count').innerHTML = '— <small>could not load</small>';
});
</script>
</body>
</html>
