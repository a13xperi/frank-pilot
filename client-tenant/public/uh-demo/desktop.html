<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Universal Housing — desktop demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#FBF7F0" />
<meta name="description" content="Affordable housing made simple — Las Vegas (desktop)." />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet" />

<style>
  html, body, #root { margin: 0; padding: 0; min-height: 100%; }
  body {
    background: #F4EFE5;
    font-family: "Inter", -apple-system, system-ui, sans-serif;
    color: #1F1A12;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  * { box-sizing: border-box; }
  button { font: inherit; }
  :focus-visible { outline: 2px solid #1F1A12; outline-offset: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Desktop variant: phone-native off; signal demo-shell to skip auto-mount so
     desktop-shell takes over the #root. The "PHONE_SHELL_WILL_RENDER" flag is
     a misnomer — it really means "an alternative shell will mount." -->
<script>
  window.__UH_PHONE_NATIVE__ = false;
  window.__UH_PHONE_SHELL_WILL_RENDER__ = true;
</script>

<script type="text/babel" src="v2/primitives.jsx"></script>
<script type="text/babel" src="v2/data.jsx"></script>
<script type="text/babel" src="v2/browse-mobile.jsx"></script>
<script type="text/babel" src="v2/property-detail.jsx"></script>
<script type="text/babel" src="v2/browse.jsx"></script>
<script type="text/babel" src="v2/apply-flow.jsx"></script>
<script type="text/babel" src="v2/applicant-dashboards.jsx"></script>
<script type="text/babel" src="v2/rent-faq.jsx"></script>
<script type="text/babel" src="v2/calc-tape.jsx"></script>
<script type="text/babel" src="v2/move-in.jsx"></script>
<script type="text/babel" src="v2/tenant-lifecycle.jsx"></script>
<script type="text/babel" src="v2/move-out.jsx"></script>
<script type="text/babel" src="v2/asset-manager.jsx"></script>
<script type="text/babel" src="v2/eviction-forms.jsx"></script>
<script type="text/babel" src="v2/polish.jsx"></script>
<script type="text/babel" src="v2/referral-landing.jsx"></script>
<script type="text/babel" src="v2/account.jsx"></script>
<script type="text/babel" src="v2/print-artifacts.jsx"></script>
<script type="text/babel" src="v2/edge-states.jsx"></script>
<!-- Demo timeline is defined in demo-shell.jsx so we load it first to get DEMO_TIMELINE on window -->
<script type="text/babel" src="v2/demo-shell.jsx"></script>
<script type="text/babel" src="v2/desktop-shell.jsx"></script>
</body>
</html>
