<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDPC Compliance Hub</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=Nunito+Sans:opsz,wght@6..12,400..800&display=swap"
    />
    <script>
      // Set the theme class before first paint to avoid a light-mode flash.
      (function () {
        var saved = localStorage.getItem('theme');
        var dark =
          saved === 'dark' ||
          (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
