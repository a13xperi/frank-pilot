<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Frank-Pilot — Onboarding API Flow</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="Frank-Pilot stakeholder read — full applicant → tenant onboarding chain, 16 APIs, what's real vs stubbed vs pending.">
<style>
  :root {
    --fg: #1f2328;
    --muted: #57606a;
    --border: #d0d7de;
    --bg: #ffffff;
    --code-bg: #f6f8fa;
    --link: #0969da;
    --accent: #0969da;
  }
  * { box-sizing: border-box; }
  body {
    max-width: 920px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
    color: var(--fg);
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
  }
  article { min-height: 60vh; }
  h1, h2, h3 { line-height: 1.25; }
  h1 { font-size: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; margin-top: 1rem; }
  h2 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; margin-top: 2.5rem; }
  h3 { font-size: 1.1rem; margin-top: 1.8rem; color: var(--muted); }
  a { color: var(--link); }
  blockquote {
    border-left: 4px solid var(--accent);
    background: var(--code-bg);
    padding: 0.8rem 1rem;
    margin: 1.2rem 0;
    color: var(--fg);
  }
  blockquote p { margin: 0; }
  hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }
  code {
    background: var(--code-bg);
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.88em;
  }
  pre code { background: transparent; padding: 0; }
  pre {
    background: var(--code-bg);
    padding: 1rem;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 0.85rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 0.92rem;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 0.5rem 0.7rem;
    text-align: left;
    vertical-align: top;
  }
  th { background: var(--code-bg); font-weight: 600; }
  .mermaid {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem;
    margin: 1.4rem 0;
    text-align: center;
    overflow-x: auto;
  }
  .meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  .loading { color: var(--muted); font-style: italic; }
  @media (max-width: 600px) {
    body { padding: 1.5rem 1rem 3rem; font-size: 15px; }
    h1 { font-size: 1.6rem; }
    h2 { font-size: 1.25rem; }
    table { font-size: 0.82rem; }
    th, td { padding: 0.35rem 0.5rem; }
  }
</style>
</head>
<body>
<div class="meta">Frank-Pilot CDPC · Stakeholder read · 2026-05-28</div>
<article id="content"><p class="loading">Loading…</p></article>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });

  try {
    const res = await fetch('./onboarding-flow.md', { cache: 'no-cache' });
    if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
    const md = await res.text();
    const html = marked.parse(md);
    const article = document.getElementById('content');
    article.innerHTML = html;
    // Convert ```mermaid code blocks into mermaid containers.
    article.querySelectorAll('pre code.language-mermaid').forEach((code) => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = code.textContent;
      code.parentElement.replaceWith(div);
    });
    await mermaid.run({ querySelector: '.mermaid' });
  } catch (err) {
    document.getElementById('content').innerHTML =
      `<p style="color:#b00">Failed to load doc: ${String(err.message || err)}</p>`;
  }
</script>
</body>
</html>
