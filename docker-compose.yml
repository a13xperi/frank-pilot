version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: frank-pilot-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: frank_pilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    volumes:
      - frank_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  frank_data:
